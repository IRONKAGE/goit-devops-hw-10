apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: default
spec:
  template:
    spec:
      requirements:
        - key: karpenter.k8s.aws/instance-family
          operator: In
          values: ["t3", "m5", "c5"]
        - key: karpenter.k8s.aws/instance-size
          operator: In
          values: ["small", "medium", "large", "xlarge"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"]
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default

  # 1. ЗАПОБІЖНИК: Більше цих лімітів Karpenter не створить серверів
  limits:
    cpu: "20"
    memory: "64Gi"

  # 2. ОПТИМІЗАЦІЯ ВИТРАТ: Karpenter сам видалятиме порожні ноди
  disruption:
    consolidationPolicy: WhenUnderutilized
    expireAfter: 720h # 30 днів

---
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiFamily: AL2
  # 3. ОБОВ'ЯЗКОВО: Роль для нод (зазвичай створюється Terraform)
  role: "KarpenterNodeRole-REPLACE_CLUSTER_NAME"

  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "REPLACE_CLUSTER_NAME"
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "REPLACE_CLUSTER_NAME"

  # Опціонально: додаємо теги всім створеним серверам, щоб бачити їх в AWS Billing
  tags:
    Environment: "prod"
    ManagedBy: "karpenter"

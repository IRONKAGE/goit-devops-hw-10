apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bootstrap-k8s-addons
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/ironkage/goit-devops-hw-10.git'
    targetRevision: HEAD
    path: k8s-addons
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
